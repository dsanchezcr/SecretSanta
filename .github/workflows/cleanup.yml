# ============================================================================
# Secret Santa - Cleanup Expired Games
# ============================================================================
# Azure Static Web Apps Managed Functions only support HTTP triggers, not
# timer/schedule triggers. This workflow calls the cleanup HTTP endpoint on a
# daily schedule, replacing the former timer trigger.
#
# The endpoint validates the X-Cleanup-Secret header against the CLEANUP_SECRET
# app setting to prevent unauthorized invocations.
#
# Required GitHub Secret:
#   CLEANUP_SECRET    - shared secret stored in Azure app settings and here
#   AZURE_CREDENTIALS - service principal for Azure CLI login (QA only)
#
# Workflow env variable:
#   AZURE_PROD_APP_URL - production custom domain (update if using a different environment)
# ============================================================================

name: Cleanup Expired Games

on:
  schedule:
    - cron: '0 2 * * *'  # Daily at 2:00 AM UTC
  workflow_dispatch:       # Allow manual trigger

permissions:
  contents: read

env:
  AZURE_QA_RESOURCE_GROUP: 'secretsanta-qa'
  AZURE_RESOURCE_GROUP: 'secretsanta'
  # Production custom domain — update this if you deploy to a different environment.
  # The default azurestaticapps.net hostname redirects here, so using it directly
  # avoids the extra redirect hop and removes the Azure CLI dependency at cleanup time.
  AZURE_PROD_APP_URL: 'https://secretsanta.dsanchezcr.com'

jobs:
  # ==========================================================================
  # CLEANUP QA ENVIRONMENT
  # ==========================================================================
  cleanup-qa:
    name: Cleanup QA
    runs-on: ubuntu-latest

    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get QA App URL
        id: app-url
        run: |
          SWA_NAME=$(az staticwebapp list --resource-group "${{ env.AZURE_QA_RESOURCE_GROUP }}" --query "[0].name" -o tsv 2>/dev/null || echo "")
          if [ -z "$SWA_NAME" ]; then
            echo "⚠️ No Static Web App found in QA resource group. Skipping."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            HOSTNAME=$(az staticwebapp show --name "$SWA_NAME" --resource-group "${{ env.AZURE_QA_RESOURCE_GROUP }}" --query "defaultHostname" -o tsv 2>/dev/null || echo "")
            if [ -z "$HOSTNAME" ]; then
              echo "⚠️ Static Web App '$SWA_NAME' did not return a default hostname. Skipping."
              echo "skip=true" >> $GITHUB_OUTPUT
            else
              echo "url=https://$HOSTNAME" >> $GITHUB_OUTPUT
              echo "skip=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Trigger Cleanup (QA)
        if: steps.app-url.outputs.skip != 'true'
        run: |
          ENDPOINT="${{ steps.app-url.outputs.url }}/api/games/cleanup"
          echo "🧹 Calling cleanup endpoint: $ENDPOINT"

          RESPONSE_FILE=/tmp/cleanup-response.json

          HTTP_CODE=$(curl -sS -L -o "$RESPONSE_FILE" -w "%{http_code}" \
            -X POST \
            -H "x-cleanup-secret: ${{ secrets.CLEANUP_SECRET }}" \
            -H "Content-Type: application/json" \
            "$ENDPOINT") || {
            CURL_EXIT_CODE=$?
            echo "❌ curl failed with exit code $CURL_EXIT_CODE (no HTTP response available)."
            if [ -f "$RESPONSE_FILE" ]; then
              echo "Partial response body:"
              cat "$RESPONSE_FILE"
            fi
            exit "$CURL_EXIT_CODE"
          }

          if [ -f "$RESPONSE_FILE" ]; then
            BODY=$(cat "$RESPONSE_FILE")
          else
            BODY=""
          fi

          echo "Response body: $BODY"
          echo "HTTP status: $HTTP_CODE"

          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "❌ Cleanup failed with HTTP status $HTTP_CODE"
            exit 1
          fi

          echo "✅ QA cleanup completed successfully"
          echo "$BODY" >> $GITHUB_STEP_SUMMARY

  # ==========================================================================
  # CLEANUP PRODUCTION ENVIRONMENT
  # ==========================================================================
  cleanup-production:
    name: Cleanup Production
    runs-on: ubuntu-latest
    # Run independently of QA so a QA failure does not skip production cleanup
    # No Azure login needed - the production URL is taken from AZURE_PROD_APP_URL env variable.

    steps:
      - name: Get Production App URL
        id: app-url
        run: |
          echo "url=${{ env.AZURE_PROD_APP_URL }}" >> $GITHUB_OUTPUT
          echo "skip=false" >> $GITHUB_OUTPUT

      - name: Trigger Cleanup (Production)
        if: steps.app-url.outputs.skip != 'true'
        run: |
          ENDPOINT="${{ steps.app-url.outputs.url }}/api/games/cleanup"
          echo "🧹 Calling cleanup endpoint: $ENDPOINT"

          RESPONSE_FILE=/tmp/cleanup-response.json

          HTTP_CODE=$(curl -sS -L -o "$RESPONSE_FILE" -w "%{http_code}" \
            -X POST \
            -H "x-cleanup-secret: ${{ secrets.CLEANUP_SECRET }}" \
            -H "Content-Type: application/json" \
            "$ENDPOINT") || {
            CURL_EXIT_CODE=$?
            echo "❌ curl failed with exit code $CURL_EXIT_CODE (no HTTP response available)."
            if [ -f "$RESPONSE_FILE" ]; then
              echo "Partial response body:"
              cat "$RESPONSE_FILE"
            fi
            exit "$CURL_EXIT_CODE"
          }

          if [ -f "$RESPONSE_FILE" ]; then
            BODY=$(cat "$RESPONSE_FILE")
          else
            BODY=""
          fi

          echo "Response body: $BODY"
          echo "HTTP status: $HTTP_CODE"

          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "❌ Cleanup failed with HTTP status $HTTP_CODE"
            exit 1
          fi

          echo "✅ Production cleanup completed successfully"
          echo "$BODY" >> $GITHUB_STEP_SUMMARY
